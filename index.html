<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gemini AI Chat Bot</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:420px;
    height:700px;
    background:#111827;
    display:flex;
    flex-direction:column;
    border-radius:12px;
    overflow:hidden;
}

.header{
    background:#1f2937;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:80%;
    white-space:pre-wrap;
}

.user{
    background:#2563eb;
    color:white;
    align-self:flex-end;
}

.bot{
    background:#374151;
    color:white;
    align-self:flex-start;
}

.inputBox{
    display:flex;
    padding:10px;
    background:#1f2937;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#374151;
    color:white;
}

button{
    margin-left:8px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <div class="header">⚡ Gemini AI Chat Bot (Free)</div>

    <div class="chat" id="chat"></div>

    <div class="inputBox">
        <input id="input" placeholder="Ask anything...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(){
    const text = input.value;
    if(!text.trim()) return;

    add(text, "user");
    input.value = "";

    add("Thinking...", "bot");

    try{
        const res = await fetch("http://localhost:3000/chat", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        chat.lastChild.textContent = data.reply;

    }catch(e){
        chat.lastChild.textContent = "Server error ⚠️";
    }
}

input.addEventListener("keypress",(e)=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
